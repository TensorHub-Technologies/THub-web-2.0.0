<!doctype html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TensorHub A Low Code No Code Platform</title>
    
    <!-- Script to apply dark mode based on local storage -->
    <script>
      (function() {
          const isDarkMode = JSON.parse(localStorage.getItem('isDarkMode'));
          if (isDarkMode) {
              document.documentElement.classList.add('dark');
          }
      })();
    </script>

    <!-- Moved the main script here -->
    <script type="module" src="/src/main.jsx"></script>
  </head>
  
  <body>
    <div id="root"></div>
  </body>
</html>
