  <script>
    function onChatbotButtonClick() {
      const name = localStorage.getItem("name");
      if (name) {
        console.log(`Hello, ${name}! DOM Button clicked!`);
      } else {
        alert("Name not found in local storage. Shadow DOM Button clicked!");
      }
    }

    // Attach event listener after DOM and chatbot content is loaded
    document.addEventListener("DOMContentLoaded", () => {
      const interval = setInterval(() => {
        const thubChatbot = document.querySelector("body > thub-chatbot");
        if (thubChatbot?.shadowRoot) {
          const button = thubChatbot.shadowRoot.querySelector("button");
          if (button) {
            clearInterval(interval);
            button.addEventListener("click", onChatbotButtonClick);
          }
        }
      }, 500);
    });
  </script>
