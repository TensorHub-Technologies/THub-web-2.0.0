name: Deploy to Azure Container App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push Container Image
        uses: azure/docker-login@v1
        with:
          login-server: ca7a4dd637e6acr.azurecr.io
          username: ca7a4dd637e6acr
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          docker build -t ca7a4dd637e6acr.azurecr.io/thub:${{ github.sha }} .
          docker push ca7a4dd637e6acr.azurecr.io/thub:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ca7a4dd637e6acr.azurecr.io/thub:${{ github.sha }}
