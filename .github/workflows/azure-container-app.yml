trigger:
  - main
 
variables:
  azureSubscription: ARMSC                # ARM service connection name
  dockerRegistryServiceConnection: DockerSC   # Docker Registry service connection name
  resourceGroup: gs_rg_0361
  acrName: ca7a4dd637e6acr                # ACR name (not FQDN)
  containerAppName: thub-web
  imageName: thub-web
  tag: $(Build.BuildId)
 
pool:
  vmImage: ubuntu-latest
 
stages:
  - stage: Build
    displayName: Build & Push Image
    jobs:
      - job: Build
        steps:
          - checkout: self
 
          - task: AzureCLI@2
            displayName: Azure Login
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az account show
 
          - task: Docker@2
            displayName: Build and Push Image
            inputs:
              command: buildAndPush
              repository: $(imageName)
              dockerfile: Dockerfile
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
 
          - task: AzureCLI@2
            displayName: Verify Image in ACR
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "Checking if image tag exists in ACR..."
                az acr repository show-tags --name $(acrName) --repository $(imageName) --top 20 | grep $(tag)
 
  - stage: Deploy
    displayName: Deploy to Azure Container Apps
    dependsOn: Build
    jobs:
      - job: Deploy
        steps:
          - task: AzureCLI@2
            displayName: Deploy to Container App
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                az extension add --name containerapp --upgrade
 
                IMAGE="$(acrName).azurecr.io/$(imageName):$(tag)"
                echo "Deploying image: ${IMAGE}"
 
                az containerapp update \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image "${IMAGE}" \
                  --registry-server "$(acrName).azurecr.io"
 
                az containerapp ingress update \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --type external \
                  --target-port 3000
 
